<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 850px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        form {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4facfe;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f5f5f5;
        }

        a {
            color: red;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Employee Management System</h2>

    <form action="/add" method="POST">
        <input name="name" placeholder="Name" required>
        <input name="email" placeholder="Email" required>
        <input name="position" placeholder="Position" required>
        <button type="submit">Add Employee</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Position</th>
            <th>Action</th>
        </tr>

        {% for e in employees %}
        <tr>
            <td>{{ e.id }}</td>
            <td>{{ e.name }}</td>
            <td>{{ e.email }}</td>
            <td>{{ e.position }}</td>
            <td>
                <a href="/delete/{{ e.id }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
